<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Event | Scouts</title>

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #faf9ff;
  color: #222;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #5b2c83, #7b4bb3);
  color: white;
  padding: 70px 20px;
  text-align: center;
}

/* NAV (UNIVERSAL) */
nav {
  background: #3e1d5c;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  padding: 12px;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  padding: 8px 12px;
  border-radius: 8px;
}

nav a:hover {
  background: rgba(255,255,255,0.12);
}

/* CONTAINER */
.container {
  max-width: 800px;
  margin: auto;
  padding: 40px 20px;
}

/* CARD */
.card {
  background: white;
  padding: 30px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
  box-sizing: border-box;
  font-size: 1rem;
}

/* BUTTON */
button {
  background: #5b2c83;
  color: white;
  border: none;
  padding: 12px 18px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  width: 100%;
}

button:hover {
  background: #4a2268;
}

/* TOAST */
#toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #5b2c83;
  color: white;
  padding: 12px 20px;
  border-radius: 12px;
  opacity: 0;
  transition: 0.3s;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(-10px);
}

</style>
</head>

<body>

<header>
  <h1>Create Event</h1>
</header>

<!-- UNIVERSAL NAVBAR -->
<nav>
  <a href="leader.html">Dashboard</a>
  <a href="../index.html">Home</a>
  <a href="../events/index.html">Events</a>
  <a href="../sections/index.html">Sections</a>
  <a href="../discounts/index.html">Discounts</a>
  <a href="../joining.html">Join</a>
  <a href="../contact/index.html">Contact</a>
</nav>

<div class="container">

  <div class="card">

    <input id="title" placeholder="Event Title">
    <input id="date" type="date">
    <textarea id="desc" placeholder="Description (optional)"></textarea>

    <button onclick="saveEvent()">Create Event</button>

  </div>

</div>

<div id="toast">Saved ✓</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbwpewJd11-3eJcaRd1UYMVux3tE-dHdmjudXMgd89gWJgtDwCzDJX4-f-kuyaJJLi_V/exec";

async function saveEvent() {

  const title = document.getElementById("title").value;
  const date = document.getElementById("date").value;
  const description = document.getElementById("desc").value;

  const res = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({
      type: "addEvent",
      name: title,
      date: date,
      description: description
    })
  });

  const data = await res.json();

  if (data.success) {

    showToast("Event created ✓");

    // CLEAR FIELDS (prevents duplicates)
    document.getElementById("title").value = "";
    document.getElementById("date").value = "";
    document.getElementById("desc").value = "";

  } else {
    showToast("Failed to create event");
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");

  setTimeout(() => {
    t.classList.remove("show");
  }, 2000);
}

</script>

</body>
</html>
