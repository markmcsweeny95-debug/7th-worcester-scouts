<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>7th Worcester Scouts</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
}

/* NAVBAR */
nav {
  background: #4b2e83;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: white;
}

nav a {
  color: white;
  text-decoration: none;
  margin: 0 10px;
}

/* HEADER */
header {
  background: #6b4bbd;
  color: white;
  padding: 30px;
  text-align: center;
}

/* CONTENT */
section {
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.bar {
  background: white;
  padding: 10px;
  margin: 8px 0;
  border-left: 6px solid #4b2e83;
}
</style>

</head>
<body>

<!-- NAVIGATION -->
<nav>
  <div><strong>7th Worcester Scouts</strong></div>
  <div>
    <a href="#">Home</a>
    <a href="#events">Events</a>
    <a href="#points">Cubs Points</a>
  </div>
</nav>

<!-- HEADER -->
<header>
  <h1>Welcome to 7th Worcester Scouts</h1>
  <p>Beavers • Cubs • Scouts</p>
</header>

<!-- EVENTS -->
<section id="events">
  <h2>Upcoming Events</h2>
  <div id="eventsContainer"></div>
</section>

<!-- CUBS POINTS -->
<section id="points">
  <h2>Cubs Points</h2>
  <div id="pointsContainer"></div>
</section>

<!-- EVENTS SCRIPT -->
<script>
const EVENTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrFILlB4hbC-71RRxDWJ9B8fzsZOk-ctYnPiNnNoDO3Sw9ZBqWvoIj1D_2hxlMy_3qF7y7QPopAiV_/pub?gid=0&single=true&output=csv";

fetch(EVENTS_URL)
  .then(r => r.text())
  .then(csv => {
    const rows = csv.trim().split("\n").slice(1);
    const container = document.getElementById("eventsContainer");

    rows.forEach(row => {
      const [title, date, summary] = row.split(",");

      if (!title) return;

      container.innerHTML += `
        <div class="card">
          <h3>${title}</h3>
          <p><strong>${date}</strong></p>
          <p>${summary}</p>
        </div>
      `;
    });
  });
</script>

<!-- CUBS POINTS SCRIPT -->
<script>
const POINTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrFILlB4hbC-71RRxDWJ9B8fzsZOk-ctYnPiNnNoDO3Sw9ZBqWvoIj1D_2hxlMy_3qF7y7QPopAiV_/pub?gid=1&single=true&output=csv";

fetch(POINTS_URL)
  .then(r => r.text())
  .then(csv => {
    const rows = csv.trim().split("\n").slice(1);
    const container = document.getElementById("pointsContainer");

    rows.forEach(row => {
      const [pack, points] = row.split(",");

      if (!pack) return;

      container.innerHTML += `
        <div class="bar">
          <strong>${pack}</strong> — ${points} pts
        </div>
      `;
    });
  });
</script>

</body>
</html>
