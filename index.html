<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>7th Worcester Scouts</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #4b2e83;
  color: white;
  padding: 20px;
  text-align: center;
}

section {
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.bar {
  background: #fff;
  padding: 10px;
  margin: 8px 0;
  border-left: 6px solid #4b2e83;
}
</style>

</head>
<body>

<header>
  <h1>7th Worcester Scouts</h1>
  <p>Welcome to our group website</p>
</header>

<!-- EVENTS -->
<section>
  <h2>Upcoming Events</h2>
  <div id="events"></div>
</section>

<!-- CUBS POINTS -->
<section>
  <h2>Cubs Points</h2>
  <div id="points"></div>
</section>

<!-- EVENTS SCRIPT -->
<script>
const EVENTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrFILlB4hbC-71RRxDWJ9B8fzsZOk-ctYnPiNnNoDO3Sw9ZBqWvoIj1D_2hxlMy_3qF7y7QPopAiV_/pub?gid=0&single=true&output=csv";

fetch(EVENTS_URL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.trim().split("\n").slice(1);
    const container = document.getElementById("events");

    rows.forEach(row => {
      const [title, date, summary] = row.split(",");

      if (!title) return;

      container.innerHTML += `
        <div class="card">
          <h3>${title}</h3>
          <p><strong>${date}</strong></p>
          <p>${summary}</p>
        </div>
      `;
    });
  });
</script>

<!-- CUBS POINTS SCRIPT -->
<script>
const POINTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrFILlB4hbC-71RRxDWJ9B8fzsZOk-ctYnPiNnNoDO3Sw9ZBqWvoIj1D_2hxlMy_3qF7y7QPopAiV_/pub?gid=1&single=true&output=csv";

fetch(POINTS_URL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.trim().split("\n").slice(1);
    const container = document.getElementById("points");

    rows.forEach(row => {
      const [pack, points] = row.split(",");

      if (!pack) return;

      container.innerHTML += `
        <div class="bar">
          <strong>${pack}</strong> — ${points} pts
        </div>
      `;
    });
  });
</script>

</body>
</html>
