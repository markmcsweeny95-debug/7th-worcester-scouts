<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cubs Settings</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f0ff;
  color:#222;
}

/* HEADER */
header{
  background:linear-gradient(135deg,#5b2c83,#7b3fb3);
  color:white;
  padding:25px;
  text-align:center;
}

/* NAV */
nav{
  background:#3e1d5c;
  padding:12px;
  text-align:center;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:bold;
  margin:0 10px;
}

/* WRAPPER */
.wrapper{
  max-width:900px;
  margin:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* CARD */
.card{
  background:white;
  border-radius:16px;
  padding:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* PACK ROW */
.pack{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  border-radius:12px;
  background:#faf9ff;
  border:1px solid #eee;
  margin-top:10px;
}

/* BUTTONS */
.btn{
  width:30px;
  height:30px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
  color:white;
}

.minus{
  background:#d32f2f;
}

.plus{
  background:#2e7d32;
}

.btn:hover{
  opacity:0.85;
}

/* POINTS */
.points{
  font-weight:bold;
  margin:0 10px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#5b2c83;
  color:white;
  padding:10px 18px;
  border-radius:10px;
  opacity:0;
  transition:0.3s;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(-5px);
}

</style>
</head>

<body>

<header>
  <h1>Cubs Settings</h1>
  <p>Adjust pack points</p>
</header>

<nav>
  <a href="leader.html">Back</a>
</nav>

<div class="wrapper">

  <div class="card">
    <h2>Cubs Packs</h2>
    <div id="packs">Loading...</div>
  </div>

</div>

<div id="toast" class="toast">Saved</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbwpewJd11-3eJcaRd1UYMVux3tE-dHdmjudXMgd89gWJgtDwCzDJX4-f-kuyaJJLi_V/exec";

let cubsData = [];

/* LOAD */
async function load(){

  const res = await fetch(API);
  const data = await res.json();

  cubsData = data.cubs || [];

  render();
}

/* RENDER */
function render(){

  const container = document.getElementById("packs");
  container.innerHTML = "";

  for(let i = 1; i < cubsData.length; i++){

    const name = cubsData[i][0];
    const points = cubsData[i][1];

    container.innerHTML += `
      <div class="pack">

        <div>
          <h3 style="margin:0;">${name}</h3>
        </div>

        <div style="display:flex; align-items:center; gap:10px;">

          <button class="btn minus" onclick="changePoints(${i}, -1)">-</button>

          <span class="points">${points} pts</span>

          <button class="btn plus" onclick="changePoints(${i}, 1)">+</button>

        </div>

      </div>
    `;
  }
}

/* CHANGE POINTS */
async function changePoints(row, delta){

  const res = await fetch(API, {
    method: "POST",
    headers: {"Content-Type":"text/plain"},
    body: JSON.stringify({
      type: "changeCubsPoints",
      row: row,
      delta: delta
    })
  });

  const data = await res.json();

  if(data.success){
    toast("Updated");
    load();
  } else {
    toast("Error");
  }
}

/* TOAST */
function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");

  setTimeout(() => {
    t.classList.remove("show");
  }, 2000);
}

load();

</script>

</body>
</html>
