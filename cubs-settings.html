<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cubs | 7th Worcester Scouts</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #faf9ff;
  color: #222;
}

/* HEADER (CUBS GREEN) */
header {
  background: #2e7d32;
  color: white;
  padding: 35px 20px;
  text-align: center;
}

/* NAV (DARK GREEN ADMIN STYLE) */
nav {
  background: #1b5e20;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  padding: 12px;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  padding: 8px 12px;
  border-radius: 8px;
}

nav a:hover {
  background: rgba(255,255,255,0.12);
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
}

/* CARD */
.card {
  background: white;
  padding: 30px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  margin-bottom: 25px;
}

/* TEAM ROW */
.team {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid #eee;
}

.team:last-child {
  border-bottom: none;
}

/* BUTTONS */
button {
  background: #2e7d32;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  margin-left: 5px;
}

button:hover {
  background: #256428;
}

/* SCORE */
.score {
  font-size: 1.3rem;
  font-weight: bold;
  color: #2e7d32;
}

/* FOOTER */
footer {
  background: #1b5e20;
  color: white;
  text-align: center;
  padding: 24px;
  margin-top: 40px;
}

</style>
</head>

<body>

<header>
  <h1>Cubs</h1>
  <p>Leader Admin Panel</p>
</header>

<!-- ADMIN NAV -->
<nav>
  <a href="leader.html">Dashboard</a>
  <a href="cubs-settings.html">Cubs</a>
  <a href="beavers-settings.html">Beavers</a>
  <a href="scouts-settings.html">Scouts</a>
  <a href="https://markmcsweeny95-debug.github.io/7th-worcester-scouts/index.html">Logout</a>
</nav>

<div class="container">

  <div class="card">
    <h2>Cubs Points Editor</h2>

    <div class="team">
      <div>
        <b>Eagles</b><br>
        <span id="eaglesScore" class="score">0</span>
      </div>

      <div>
        <button onclick="changePoints('Eagles', 1)">+</button>
        <button onclick="changePoints('Eagles', -1)">-</button>
      </div>
    </div>

    <div class="team">
      <div>
        <b>Falcons</b><br>
        <span id="falconsScore" class="score">0</span>
      </div>

      <div>
        <button onclick="changePoints('Falcons', 1)">+</button>
        <button onclick="changePoints('Falcons', -1)">-</button>
      </div>
    </div>

  </div>

</div>

<footer>
  © 2026 7th Worcester Scout Group
</footer>

<script>

const API = "https://script.google.com/macros/s/AKfycbwpewJd11-3eJcaRd1UYMVux3tE-dHdmjudXMgd89gWJgtDwCzDJX4-f-kuyaJJLi_V/exec";

async function loadPoints() {

  const res = await fetch(API);
  const data = await res.json();

  let eagles = 0;
  let falcons = 0;

  for (const row of data.cubs) {
    if (row[0] === "Eagles") eagles = Number(row[1]) || 0;
    if (row[0] === "Falcons") falcons = Number(row[1]) || 0;
  }

  document.getElementById("eaglesScore").innerText = eagles;
  document.getElementById("falconsScore").innerText = falcons;
}

async function changePoints(team, delta) {

  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({
      type: "updatePoints",
      team: team,
      delta: delta
    })
  });

  loadPoints();
}

loadPoints();

</script>

</body>
</html>
