<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leader Admin | 7th Worcester Scouts</title>

<style>

body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#faf9ff;
  color:#222;
}

header{
  background: linear-gradient(135deg, #5b2c83, #7b4bb3);
  color:white;
  padding:70px 20px;
  text-align:center;
}

nav{
  background:#4a2268;
  padding:14px;
  text-align:center;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 14px;
  font-weight:bold;
}

.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

.card{
  background:white;
  padding:35px;
  border-radius:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  margin-bottom:25px;
}

h2{
  color:#5b2c83;
}

input{
  width:100%;
  padding:14px;
  margin-top:10px;
  margin-bottom:20px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:1rem;
  box-sizing:border-box;
}

.button{
  display:inline-block;
  padding:12px 22px;
  background:#5b2c83;
  color:white;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.button:hover{
  opacity:0.92;
}

.hidden{
  display:none;
}

footer{
  background:#5b2c83;
  color:white;
  text-align:center;
  padding:24px;
  margin-top:40px;
}

</style>
</head>

<body>

<header>

  <h1>Leader Admin Panel</h1>

  <p>
    7th Worcester Scout Group
  </p>

</header>

<nav>
  <a href="index.html">Home</a>
  <a href="events/index.html">Events</a>
  <a href="sections/index.html">Sections</a>
  <a href="contact/index.html">Contact</a>
</nav>

<div class="container">

  <!-- LOGIN -->

  <div class="card" id="loginCard">

    <h2>Leader Login</h2>

    <input
      type="password"
      id="password"
      placeholder="Enter leader password"
    >

    <button class="button" onclick="login()">
      Login →
    </button>

    <p id="loginMessage"></p>

  </div>

  <!-- ADMIN PANEL -->

  <div class="card hidden" id="adminPanel">

    <h2>Edit Cubs Points</h2>

    <label>Eagles Points</label>

    <input type="number" id="eaglesInput">

    <label>Falcons Points</label>

    <input type="number" id="falconsInput">

    <button class="button" onclick="savePoints()">
      Save Points →
    </button>

    <p id="saveMessage"></p>

  </div>

</div>

<footer>
  © 2026 7th Worcester Scout Group
</footer>

<script>

// CHANGE THIS PASSWORD
const adminPassword = "scouts50";

// LOGIN
function login(){

  const entered =
    document.getElementById("password").value;

  if(entered === adminPassword){

    document.getElementById("loginCard")
      .classList.add("hidden");

    document.getElementById("adminPanel")
      .classList.remove("hidden");

    loadPoints();

  } else {

    document.getElementById("loginMessage")
      .innerText = "Incorrect password";

  }

}

// LOAD EXISTING POINTS
function loadPoints(){

  const eagles =
    localStorage.getItem("eaglesPoints") || 120;

  const falcons =
    localStorage.getItem("falconsPoints") || 105;

  document.getElementById("eaglesInput").value =
    eagles;

  document.getElementById("falconsInput").value =
    falcons;

}

// SAVE POINTS
function savePoints(){

  const eagles =
    document.getElementById("eaglesInput").value;

  const falcons =
    document.getElementById("falconsInput").value;

  localStorage.setItem("eaglesPoints", eagles);

  localStorage.setItem("falconsPoints", falcons);

  document.getElementById("saveMessage")
    .innerText = "Points saved successfully.";

}

</script>

</body>
</html>
