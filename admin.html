<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
</head>

<body>

<h1>Scout Admin</h1>

<input id="password" placeholder="Password"><br><br>

<h2>Cubs Points</h2>

Eagles:
<input id="eagles"><br><br>

Falcons:
<input id="falcons"><br><br>

<button onclick="save()">Save</button>

<p id="msg"></p>

<script>

const API =
"https://script.google.com/macros/s/AKfycby3lQ7jcNFMiTq2IPpuSS_RbMnJS2e3xKE5_0X2VDyzElr-nt78N17AVTHIgLbXfjMQSw/exec";

async function save() {

  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      type: "cubs",
      password: document.getElementById("password").value,
      eagles: document.getElementById("eagles").value,
      falcons: document.getElementById("falcons").value
    })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("msg").innerText = "Saved!";
  } else {
    document.getElementById("msg").innerText = "Failed: " + data.error;
  }

}

</script>

</body>
</html>
