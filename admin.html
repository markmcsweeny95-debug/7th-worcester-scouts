<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leader Login | 7th Worcester Scouts</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #faf9ff;
  color: #222;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #5b2c83, #7b4bb3);
  color: white;
  text-align: center;
  padding: 80px 20px;
}

header h1 {
  margin: 0;
}

header p {
  opacity: 0.9;
}

/* NAVBAR */
nav {
  background: #4a2268;
  padding: 14px;
  text-align: center;
}

nav a {
  color: white;
  text-decoration: none;
  margin: 0 14px;
  font-weight: bold;
}

/* LOGIN BOX */
.container {
  max-width: 500px;
  margin: 50px auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 35px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

h2 {
  color: #5b2c83;
  margin-top: 0;
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  margin-bottom: 20px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 1rem;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #5b2c83;
  color: white;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #4a2268;
}

/* ERROR */
#error {
  color: red;
  margin-top: 15px;
  display: none;
}

/* FOOTER */
footer {
  background: #5b2c83;
  color: white;
  text-align: center;
  padding: 24px;
  margin-top: 60px;
}

</style>
</head>

<body>

<header>
  <h1>Leader Login</h1>
  <p>7th Worcester Scout Group</p>
</header>

<nav>
  <a href="/7th-worcester-scouts/index.html">Home</a>
  <a href="/7th-worcester-scouts/events/index.html">Events</a>
  <a href="/7th-worcester-scouts/sections/index.html">Sections</a>
  <a href="/7th-worcester-scouts/contact/index.html">Contact</a>
</nav>

<div class="container">

  <div class="card">

    <h2>Leader Access</h2>

    <input
      type="text"
      id="username"
      placeholder="Username"
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
    >

    <button onclick="login()">
      Login →
    </button>

    <p id="error">
      Incorrect username or password
    </p>

  </div>

</div>

<footer>
  © 2026 7th Worcester Scout Group
</footer>

<script>

function login() {

  const username =
    document.getElementById("username").value;

  const password =
    document.getElementById("password").value;

  if (
    username === "leader" &&
    password === "scout-admin-2026"
  ) {

    // redirect to correct leader panel
    window.location.href =
      "/7th-worcester-scouts/leader.html";

  }

  else {

    document.getElementById("error").style.display =
      "block";

  }

}

</script>

</body>
</html>
