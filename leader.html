<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leader Dashboard | 7th Worcester Scouts</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f0ff;
  color:#222;
}

/* HEADER */
header{
  background:linear-gradient(135deg,#5b2c83,#7b3fb3);
  color:white;
  padding:35px 20px;
  text-align:center;
}

/* NAV */
nav{
  background:#3e1d5c;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:12px;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:bold;
  padding:8px 12px;
  border-radius:8px;
}

nav a:hover{
  background:rgba(255,255,255,0.12);
}

/* LAYOUT */
.wrapper{
  max-width:1000px;
  margin:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* CARD */
.card{
  background:white;
  border-radius:16px;
  padding:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* HEADINGS */
h2{
  margin-top:0;
  color:#5b2c83;
}

/* INPUTS */
input,textarea{
  width:100%;
  box-sizing:border-box;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:1rem;
}

textarea{
  min-height:90px;
}

/* BUTTON */
button{
  width:100%;
  background:#5b2c83;
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#4a2268;
}

/* EVENT */
.event{
  position:relative;
  border:1px solid #eee;
  border-radius:12px;
  padding:14px;
  margin-top:10px;
  background:#faf9ff;
}

/* DELETE */
.delete-btn{
  position:absolute;
  top:8px;
  right:8px;
  width:24px;
  height:24px;
  border-radius:6px;
  border:none;
  background:#d32f2f;
  color:white;
  font-size:16px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.delete-btn:hover{
  background:#b71c1c;
}

/* PIN */
.pin-btn{
  position:absolute;
  top:8px;
  right:38px;
  width:24px;
  height:24px;
  border-radius:6px;
  border:none;
  background:#ffb300;
  color:white;
  font-size:14px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.pin-btn.active{
  background:#2e7d32;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  background:#5b2c83;
  color:white;
  padding:12px 20px;
  border-radius:12px;
  opacity:0;
  transition:0.3s;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(-6px);
}

</style>
</head>

<body>

<header>
  <h1>Leader Dashboard</h1>
  <p>7th Worcester Scouts Admin Panel</p>
</header>

<nav>
  <a href="cubs-settings.html">Cubs Settings</a>
  <a href="beavers-settings.html">Beavers Settings</a>
  <a href="scouts-settings.html">Scouts Settings</a>
  <a href="https://markmcsweeny95-debug.github.io/7th-worcester-scouts/index.html">Logout</a>
</nav>

<div class="wrapper">

  <!-- CREATE EVENT -->
  <div class="card">

    <h2>Create Event</h2>

    <input id="title" placeholder="Event title">
    <input id="date" type="date">
    <textarea id="description" placeholder="Description"></textarea>

    <button onclick="addEvent()">Create Event</button>

  </div>

  <!-- EVENTS -->
  <div class="card">

    <h2>Live Events</h2>
    <div id="events">Loading...</div>

  </div>

</div>

<div id="toast" class="toast">Saved</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbwpewJd11-3eJcaRd1UYMVux3tE-dHdmjudXMgd89gWJgtDwCzDJX4-f-kuyaJJLi_V/exec";

/* LOAD */
async function loadEvents(){

  const res = await fetch(API);
  const data = await res.json();

  const container = document.getElementById("events");
  container.innerHTML = "";

  const events = data.events || [];

  for(const ev of events){

    container.innerHTML += `
      <div class="event">

        <button class="delete-btn"
          onclick="deleteEvent(${ev.id})">×</button>

        <button class="pin-btn ${ev.pinned ? 'active' : ''}"
          onclick="pinEvent(${ev.id})">📌</button>

        <h3>${ev.name}</h3>
        <p><b>${new Date(ev.date).toLocaleDateString('en-GB')}</b></p>
        <p>${ev.description}</p>

      </div>
    `;
  }
}

/* ADD */
async function addEvent(){

  const title = document.getElementById("title").value;
  const date = document.getElementById("date").value;
  const description = document.getElementById("description").value;

  const res = await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({
      type:"addEvent",
      name:title,
      date:date,
      description:description
    })
  });

  const data = await res.json();

  if(data.success){
    toast("Event created");
    loadEvents();
  }
}

/* DELETE */
async function deleteEvent(id){

  const res = await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({
      type:"deleteEvent",
      id:id
    })
  });

  const data = await res.json();

  if(data.success){
    toast("Deleted");
    loadEvents();
  }
}

/* PIN */
async function pinEvent(id){

  const res = await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({
      type:"pinEvent",
      id:id
    })
  });

  const data = await res.json();

  if(data.success){
    toast("Pinned");
    loadEvents();
  }
}

/* TOAST */
function toast(msg){

  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");

  setTimeout(() => {
    t.classList.remove("show");
  }, 2000);
}

loadEvents();

</script>

</body>
</html>
