<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leader Dashboard | 7th Worcester Scouts</title>

<style>

body{
  font-family:Arial,sans-serif;
  margin:0;
  background:#faf9ff;
  color:#222;
}

header{
  background:#5b2c83;
  color:white;
  padding:60px 20px;
  text-align:center;
}

nav{
  background:#4a2268;
  padding:14px;
  text-align:center;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 14px;
  font-weight:bold;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

.card{
  background:white;
  padding:28px;
  border-radius:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  margin-bottom:25px;
}

h2{
  color:#5b2c83;
  margin-top:0;
}

.team{
  margin-bottom:28px;
}

.row{
  display:flex;
  align-items:center;
  gap:12px;
}

.score{
  font-size:1.7rem;
  font-weight:bold;
  min-width:70px;
  text-align:center;
}

.original{
  opacity:0.7;
  font-size:0.9rem;
}

input,
textarea{
  width:100%;
  padding:14px;
  margin-top:10px;
  margin-bottom:20px;
  border-radius:12px;
  border:1px solid #ccc;
  box-sizing:border-box;
  font-size:1rem;
}

textarea{
  min-height:120px;
  resize:vertical;
}

button{
  background:#5b2c83;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  background:#4a2268;
  transform:translateY(-2px);
}

.event{
  background:#faf9ff;
  border:2px solid #eee;
  padding:22px;
  border-radius:16px;
  margin-top:18px;
}

#toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#5b2c83;
  color:white;
  padding:14px 22px;
  border-radius:12px;
  opacity:0;
  transition:0.3s;
  pointer-events:none;
}

#toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(-10px);
}

</style>
</head>

<body>

<header>
  <h1>Leader Dashboard</h1>
  <p>7th Worcester Scout Group</p>
</header>

<nav>
  <a href="/7th-worcester-scouts/index.html">
    Home Site
  </a>

  <a href="/7th-worcester-scouts/events/index.html">
    Events
  </a>
</nav>

<div class="container">

  <!-- CUBS -->
  <div class="card">

    <h2>Cubs Points</h2>

    <!-- EAGLES -->
    <div class="team">

      <h3>Eagles</h3>

      <div class="row">

        <button onclick="change('eagles',-1)">
          ⬇
        </button>

        <div>

          <div id="eagles" class="score">
            0
          </div>

          <div class="original">
            Original:
            <span id="eaglesOriginal">0</span>
          </div>

        </div>

        <button onclick="change('eagles',1)">
          ⬆
        </button>

      </div>

    </div>

    <!-- FALCONS -->
    <div class="team">

      <h3>Falcons</h3>

      <div class="row">

        <button onclick="change('falcons',-1)">
          ⬇
        </button>

        <div>

          <div id="falcons" class="score">
            0
          </div>

          <div class="original">
            Original:
            <span id="falconsOriginal">0</span>
          </div>

        </div>

        <button onclick="change('falcons',1)">
          ⬆
        </button>

      </div>

    </div>

    <button onclick="saveCubs()">
      Save Cubs Points →
    </button>

  </div>

  <!-- EVENTS -->
  <div class="card">

    <h2>Create Event</h2>

    <p style="opacity:0.8; line-height:1.6;">
      Add new events to the public events page.
    </p>

    <input
      id="title"
      placeholder="Event title"
    >

    <input
      id="date"
      placeholder="10th July 2026"
    >

    <textarea
      id="description"
      placeholder="Event description"
    ></textarea>

    <button onclick="createEvent()">
      Create Event →
    </button>

  </div>

  <!-- LIVE EVENTS -->
  <div class="card">

    <h2>Current Events</h2>

    <div id="events">

      Loading events...

    </div>

  </div>

</div>

<div id="toast">
  Saved ✓
</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycby3lQ7jcNFMiTq2IPpuSS_RbMnJS2e3xKE5_0X2VDyzElr-nt78N17AVTHIgLbXfjMQSw/exec";

const PASSWORD =
"scout-admin-2026";

let state = {
  eagles:0,
  falcons:0
};

let original = {
  eagles:0,
  falcons:0
};

/* LOAD DATA */

async function loadData(){

  const res =
    await fetch(API);

  const data =
    await res.json();

  /* CUBS */

  if(data.cubs){

    const cubs =
      data.cubs.slice(1);

    cubs.forEach(row=>{

      if(row[0]==="Eagles"){

        state.eagles =
          Number(row[1]);

        original.eagles =
          Number(row[1]);

      }

      if(row[0]==="Falcons"){

        state.falcons =
          Number(row[1]);

        original.falcons =
          Number(row[1]);

      }

    });

    renderCubs();

  }

  /* EVENTS */

  if(data.events){

    renderEvents(data.events);

  }

}

loadData();

/* RENDER CUBS */

function renderCubs(){

  document.getElementById("eagles")
    .innerText = state.eagles;

  document.getElementById("falcons")
    .innerText = state.falcons;

  document.getElementById("eaglesOriginal")
    .innerText = original.eagles;

  document.getElementById("falconsOriginal")
    .innerText = original.falcons;

}

/* CHANGE POINTS */

function change(team,amount){

  state[team] += amount;

  renderCubs();

}

/* SAVE CUBS */

async function saveCubs(){

  const res = await fetch(API,{

    method:"POST",

    headers:{
      "Content-Type":"text/plain"
    },

    body:JSON.stringify({

      type:"cubs",

      password:PASSWORD,

      eagles:state.eagles,

      falcons:state.falcons

    })

  });

  const data =
    await res.json();

  if(data.success){

    original.eagles =
      state.eagles;

    original.falcons =
      state.falcons;

    renderCubs();

    toast("Points Saved ✓");

  }

}

/* CREATE EVENT */

async function createEvent(){

  const title =
    document.getElementById("title").value;

  const date =
    document.getElementById("date").value;

  const description =
    document.getElementById("description").value;

  const res = await fetch(API,{

    method:"POST",

    headers:{
      "Content-Type":"text/plain"
    },

    body:JSON.stringify({

      type:"add",

      password:PASSWORD,

      title,

      date,

      description

    })

  });

  const data =
    await res.json();

  if(data.success){

    toast("Event Created ✓");

    document.getElementById("title").value="";
    document.getElementById("date").value="";
    document.getElementById("description").value="";

    loadData();

  }

}

/* RENDER EVENTS */

function renderEvents(events){

  const container =
    document.getElementById("events");

  container.innerHTML = "";

  const rows =
    events.slice(1).reverse();

  rows.forEach(event=>{

    container.innerHTML += `

      <div class="event">

        <h3>${event[0]}</h3>

        <p><b>${event[1]}</b></p>

        <p>${event[2]}</p>

      </div>

    `;

  });

}

/* TOAST */

function toast(message){

  const toast =
    document.getElementById("toast");

  toast.innerText =
    message;

  toast.classList.add("show");

  setTimeout(()=>{

    toast.classList.remove("show");

  },2200);

}

</script>

</body>
</html>
