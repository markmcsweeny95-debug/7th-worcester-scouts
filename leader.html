<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leader Dashboard | 7th Worcester Scouts</title>

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #faf9ff;
  color: #222;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #5b2c83, #7b4bb3);
  color: white;
  padding: 70px 20px;
  text-align: center;
}

header h1 {
  margin: 0;
}

header p {
  opacity: 0.9;
}

/* NAV */
nav {
  background: #4a2268;
  padding: 14px;
  text-align: center;
  position: sticky;
  top: 0;
}

nav a {
  color: white;
  text-decoration: none;
  margin: 0 14px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px 20px;
}

/* CARDS */
.card {
  background: white;
  padding: 30px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  margin-bottom: 25px;
}

h2 {
  color: #5b2c83;
}

/* ROW */
.row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 10px 0;
}

.valueBox {
  text-align: center;
  min-width: 90px;
}

/* BUTTONS */
button {
  background: #5b2c83;
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #4a2268;
}

/* TOAST */
#toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #5b2c83;
  color: white;
  padding: 12px 20px;
  border-radius: 12px;
  opacity: 0;
  transition: 0.3s;
  pointer-events: none;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(-10px);
}

small {
  opacity: 0.6;
}

</style>
</head>

<body>

<header>
  <h1>Leader Dashboard</h1>
  <p>7th Worcester Scout Group Admin Panel</p>
</header>

<nav>
  <a href="../index.html">Home Site</a>
  <a href="../events/index.html">Events</a>
  <a href="../sections/index.html">Sections</a>
  <a href="create-events.html">Create Event</a>
  <a href="../discounts/index.html">Discounts</a>
  <a href="../contact/index.html">Contact</a>
</nav>

<div class="container">

<!-- CUBS -->
<div class="card">

  <h2>Cubs Points</h2>

  <p><b>Eagles</b></p>
  <div class="row">
    <button onclick="change('eagles', -1)">⬇</button>

    <div class="valueBox">
      <div id="eagles">0</div>
      <small>Original: <span id="eaglesOriginal">0</span></small>
    </div>

    <button onclick="change('eagles', 1)">⬆</button>
  </div>

  <p><b>Falcons</b></p>
  <div class="row">
    <button onclick="change('falcons', -1)">⬇</button>

    <div class="valueBox">
      <div id="falcons">0</div>
      <small>Original: <span id="falconsOriginal">0</span></small>
    </div>

    <button onclick="change('falcons', 1)">⬆</button>
  </div>

  <button onclick="saveCubs()">Save Cubs Points</button>

</div>

<!-- EVENTS -->
<div class="card">

  <h2>Events</h2>

  <p>Manage Scout events and announcements</p>

  <button onclick="location.href='create-events.html'">
    Create New Event →
  </button>

</div>

</div>

<!-- TOAST -->
<div id="toast">Saved ✓</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycby3lQ7jcNFMiTq2IPpuSS_RbMnJS2e3xKE5_0X2VDyzElr-nt78N17AVTHIgLbXfjMQSw/exec";

let state = {
  eagles: 0,
  falcons: 0
};

let original = {
  eagles: 0,
  falcons: 0
};

/* LOAD DATA */
fetch(API)
  .then(r => r.json())
  .then(data => {

    if (!data.cubs) return;

    data.cubs.forEach(r => {

      const name = r[0];
      const value = Number(r[1]);

      if (name === "Eagles") {
        state.eagles = original.eagles = value;
      }

      if (name === "Falcons") {
        state.falcons = original.falcons = value;
      }

    });

    render();
  });

function render() {
  document.getElementById("eagles").innerText = state.eagles;
  document.getElementById("falcons").innerText = state.falcons;

  document.getElementById("eaglesOriginal").innerText = original.eagles;
  document.getElementById("falconsOriginal").innerText = original.falcons;
}

/* CHANGE VALUES */
function change(team, val) {
  state[team] += val;
  render();
}

/* SAVE CUBS */
function saveCubs() {

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      type: "cubs",
      password: "scout-admin-2026",
      eagles: state.eagles,
      falcons: state.falcons
    })
  })
  .then(r => r.json())
  .then(d => {
    if (d.success) {
      showToast("Cubs saved ✓");
    } else {
      showToast("Error: " + d.error);
    }
  });

}

/* TOAST */
function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");

  setTimeout(() => {
    t.classList.remove("show");
  }, 2000);
}

</script>

</body>
</html>
