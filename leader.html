<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leader Dashboard | 7th Worcester Scouts</title>

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #faf9ff;
  color: #222;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #5b2c83, #7b4bb3);
  color: white;
  padding: 70px 20px;
  text-align: center;
}

header h1 {
  margin: 0;
}

header p {
  opacity: 0.9;
}

/* NAVBAR */
nav {
  background: #4a2268;
  padding: 14px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 1000;
}

nav a {
  color: white;
  text-decoration: none;
  margin: 0 14px;
  font-weight: bold;
}

/* MAIN CONTAINER */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px 20px;
}

/* CARDS */
.card {
  background: white;
  padding: 30px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  margin-bottom: 25px;
}

h2 {
  color: #5b2c83;
  margin-top: 0;
}

/* POINT ROW */
.row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 14px 0;
}

.valueBox {
  min-width: 100px;
  text-align: center;
}

.score {
  font-size: 1.4rem;
  font-weight: bold;
}

/* BUTTONS */
button {
  background: #5b2c83;
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #4a2268;
  transform: translateY(-2px);
}

/* TOAST */
#toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #5b2c83;
  color: white;
  padding: 14px 22px;
  border-radius: 12px;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s ease;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(-10px);
}

/* FOOTER */
footer {
  background: #5b2c83;
  color: white;
  text-align: center;
  padding: 24px;
  margin-top: 40px;
}

small {
  opacity: 0.7;
}

</style>
</head>

<body>

<header>
  <h1>Leader Dashboard</h1>
  <p>7th Worcester Scout Group Admin Panel</p>
</header>

<nav>
  <a href="/7th-worcester-scouts/index.html">Home Site</a>
  <a href="/7th-worcester-scouts/events/index.html">Events</a>
  <a href="/7th-worcester-scouts/sections/index.html">Sections</a>
  <a href="/7th-worcester-scouts/create-events.html">Create Event</a>
  <a href="/7th-worcester-scouts/discounts/index.html">Discounts</a>
  <a href="/7th-worcester-scouts/contact/index.html">Contact</a>
</nav>

<div class="container">

  <!-- CUB POINTS -->
  <div class="card">

    <h2>Cubs Points</h2>

    <!-- EAGLES -->
    <p><b>Eagles</b></p>

    <div class="row">

      <button onclick="change('eagles', -1)">⬇</button>

      <div class="valueBox">
        <div id="eagles" class="score">0</div>
        <small>
          Original:
          <span id="eaglesOriginal">0</span>
        </small>
      </div>

      <button onclick="change('eagles', 1)">⬆</button>

    </div>

    <!-- FALCONS -->
    <p><b>Falcons</b></p>

    <div class="row">

      <button onclick="change('falcons', -1)">⬇</button>

      <div class="valueBox">
        <div id="falcons" class="score">0</div>
        <small>
          Original:
          <span id="falconsOriginal">0</span>
        </small>
      </div>

      <button onclick="change('falcons', 1)">⬆</button>

    </div>

    <button onclick="saveCubs()">
      Save Cubs Points →
    </button>

  </div>

  <!-- EVENTS -->
  <div class="card">

    <h2>Events</h2>

    <p>
      Create and manage Scout events and announcements.
    </p>

    <button onclick="location.href='/7th-worcester-scouts/create-events.html'">
      Create Event →
    </button>

  </div>

</div>

<!-- TOAST -->
<div id="toast">Saved ✓</div>

<footer>
  © 2026 7th Worcester Scout Group
</footer>

<script>

const API =
"https://script.google.com/macros/s/AKfycby3lQ7jcNFMiTq2IPpuSS_RbMnJS2e3xKE5_0X2VDyzElr-nt78N17AVTHIgLbXfjMQSw/exec";

const PASSWORD = "scout-admin-2026";

let state = {
  eagles: 0,
  falcons: 0
};

let original = {
  eagles: 0,
  falcons: 0
};

/* LOAD CURRENT POINTS */
fetch(API)
  .then(r => r.json())
  .then(data => {

    if (!data.cubs) return;

    data.cubs.forEach(row => {

      const pack = row[0];
      const points = Number(row[1]);

      if (pack === "Eagles") {
        state.eagles = points;
        original.eagles = points;
      }

      if (pack === "Falcons") {
        state.falcons = points;
        original.falcons = points;
      }

    });

    render();

  });

/* UPDATE DISPLAY */
function render() {

  document.getElementById("eagles").innerText =
    state.eagles;

  document.getElementById("falcons").innerText =
    state.falcons;

  document.getElementById("eaglesOriginal").innerText =
    original.eagles;

  document.getElementById("falconsOriginal").innerText =
    original.falcons;

}

/* CHANGE VALUES */
function change(team, amount) {

  state[team] += amount;

  render();

}

/* SAVE TO GOOGLE SHEETS */
function saveCubs() {

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      type: "cubs",
      password: PASSWORD,
      eagles: state.eagles,
      falcons: state.falcons
    })
  })

  .then(r => r.json())

  .then(data => {

    if (data.success) {

      original.eagles = state.eagles;
      original.falcons = state.falcons;

      render();

      showToast("Points Saved ✓");

    } else {

      showToast("Error saving");

    }

  })

  .catch(err => {

    console.error(err);

    showToast("Network error");

  });

}

/* TOAST */
function showToast(message) {

  const toast =
    document.getElementById("toast");

  toast.innerText = message;

  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 2200);

}

</script>

</body>
</html>
