<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leader Dashboard | 7th Worcester Scouts</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f0ff;
  color:#222;
}

/* HEADER */
header{
  background:linear-gradient(135deg,#5b2c83,#7b3fb3);
  color:white;
  padding:40px 20px;
  text-align:center;
}

/* NAV BAR */
nav{
  background:#3e1d5c;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  padding:12px;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:bold;
  padding:8px 12px;
  border-radius:8px;
}

nav a:hover{
  background:rgba(255,255,255,0.15);
}

/* WRAPPER */
.wrapper{
  max-width:1100px;
  margin:auto;
  padding:20px;
  display:flex;
  flex-direction:column; /* STACKED LAYOUT */
  gap:20px;
}

/* CARD */
.card{
  background:white;
  border-radius:16px;
  padding:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* HEADINGS */
h2{
  margin-top:0;
  color:#5b2c83;
}

/* INPUTS */
input,textarea{
  width:100%;
  box-sizing:border-box;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:1rem;
}

textarea{
  min-height:90px;
  resize:vertical;
}

/* BUTTON */
button{
  background:#5b2c83;
  color:white;
  border:none;
  padding:12px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  width:100%;
}

button:hover{
  background:#4a2268;
}

/* EVENT */
.event{
  border:1px solid #eee;
  border-radius:12px;
  padding:14px;
  margin-top:10px;
  background:#faf9ff;
  position:relative;
}

/* DELETE BUTTON */
.delete-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:#c62828;
  color:white;
  border:none;
  border-radius:6px;
  width:28px;
  height:28px;
  cursor:pointer;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  background:#5b2c83;
  color:white;
  padding:12px 20px;
  border-radius:12px;
  opacity:0;
  transition:0.3s;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(-6px);
}

/* SMALL TEXT */
.small{
  font-size:0.85rem;
  opacity:0.7;
}

/* MOBILE TWEAKS */
@media (max-width: 700px){
  header{
    padding:30px 15px;
  }

  .card{
    padding:16px;
  }
}

</style>
</head>

<body>

<header>
  <h1>Leader Dashboard</h1>
  <p>7th Worcester Scouts Admin Panel</p>
</header>

<!-- NAV BAR -->
<nav>

  <a href="cubs-settings.html">Cubs Settings</a>
  <a href="beavers-settings.html">Beavers Settings</a>
  <a href="scouts-settings.html">Scouts Settings</a>

  <a href="../login.html">Logout</a>

</nav>

<div class="wrapper">

  <!-- CREATE EVENT -->
  <div class="card">

    <h2>Create Event</h2>

    <input id="title" placeholder="Event title">
    <input id="date" type="date">
    <textarea id="description" placeholder="Description"></textarea>

    <button onclick="addEvent()">Create Event</button>

    <p class="small">
      Events are saved to Google Sheets and automatically appear on the website.
    </p>

  </div>

  <!-- LIVE EVENTS -->
  <div class="card">

    <h2>Live Events</h2>
    <div id="events">Loading...</div>

  </div>

</div>

<div id="toast" class="toast">Saved</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbwpewJd11-3eJcaRd1UYMVux3tE-dHdmjudXMgd89gWJgtDwCzDJX4-f-kuyaJJLi_V/exec";

/* FORMAT DATE */
function formatDate(dateString){
  const date = new Date(dateString);
  return date.toLocaleDateString("en-GB", {
    day: "numeric",
    month: "long",
    year: "numeric"
  });
}

/* LOAD EVENTS */
async function loadEvents(){

  const res = await fetch(API);
  const data = await res.json();

  const container = document.getElementById("events");
  container.innerHTML = "";

  const events = data.events || [];

  if(events.length === 0){
    container.innerHTML = "No events yet";
    return;
  }

  events.sort((a,b) => new Date(a.date) - new Date(b.date));

  for(const ev of events){

    container.innerHTML += `
      <div class="event">

        <button class="delete-btn"
          onclick="deleteEvent('${ev.name}','${ev.date}')">
          ×
        </button>

        <h3>${ev.name}</h3>
        <p><b>${formatDate(ev.date)}</b></p>
        <p>${ev.description}</p>

      </div>
    `;
  }
}

/* ADD EVENT */
async function addEvent(){

  const title = document.getElementById("title").value;
  const date = document.getElementById("date").value;
  const description = document.getElementById("description").value;

  const res = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({
      type: "addEvent",
      name: title,
      date: date,
      description: description
    })
  });

  const data = await res.json();

  if(data.success){
    toast("Event created");
    document.getElementById("title").value = "";
    document.getElementById("date").value = "";
    document.getElementById("description").value = "";
    loadEvents();
  } else {
    toast("Failed");
  }
}

/* DELETE */
async function deleteEvent(name, date){

  if(!confirm("Delete event?")) return;

  const res = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({
      type: "deleteEvent",
      name: name,
      date: date
    })
  });

  const data = await res.json();

  if(data.success){
    toast("Deleted");
    loadEvents();
  } else {
    toast("Delete failed");
  }
}

/* TOAST */
function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");

  setTimeout(() => {
    t.classList.remove("show");
  }, 2000);
}

loadEvents();

</script>

</body>
</html>
