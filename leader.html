<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leader Dashboard (NEW) | 7th Worcester Scouts</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f0ff;
  color:#222;
}

/* NEW HEADER STYLE */
header{
  background:linear-gradient(135deg,#5b2c83,#7b3fb3);
  color:white;
  padding:50px 20px;
  text-align:center;
}

header h1{
  margin:0;
  font-size:2rem;
}

header p{
  margin-top:8px;
  opacity:0.85;
}

/* NAV */
nav{
  background:#3e1d5c;
  padding:12px;
  text-align:center;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 14px;
  font-weight:bold;
}

/* NEW LAYOUT */
.wrapper{
  display:flex;
  gap:20px;
  max-width:1200px;
  margin:auto;
  padding:30px;
}

/* LEFT PANEL */
.left{
  flex:2;
}

/* RIGHT PANEL */
.right{
  flex:1;
  position:sticky;
  top:20px;
  height:fit-content;
}

/* CARDS */
.card{
  background:white;
  border-radius:16px;
  padding:22px;
  margin-bottom:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

h2{
  margin-top:0;
  color:#5b2c83;
}

/* INPUTS */
input,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

textarea{
  min-height:100px;
}

/* BUTTON */
button{
  background:#5b2c83;
  color:white;
  border:none;
  padding:12px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#4a2268;
}

/* EVENT BOX */
.event{
  border:2px solid #eee;
  border-radius:12px;
  padding:16px;
  margin-top:12px;
  background:#faf9ff;
}

/* TOAST */
#toast{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  background:#5b2c83;
  color:white;
  padding:12px 20px;
  border-radius:12px;
  opacity:0;
  transition:0.3s;
}

#toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(-8px);
}

</style>
</head>

<body>

<header>
  <h1>Leader Dashboard (UPDATED)</h1>
  <p>7th Worcester Scouts Admin Panel</p>
</header>

<nav>
  <a href="/7th-worcester-scouts/index.html">Home Site</a>
  <a href="/7th-worcester-scouts/events/index.html">Events</a>
</nav>

<div class="wrapper">

  <!-- LEFT SIDE -->
  <div class="left">

    <div class="card">

      <h2>Create New Event</h2>

      <input id="title" placeholder="Event title">
      <input id="date" placeholder="10th July 2026">
      <textarea id="description" placeholder="Description (optional)"></textarea>

      <button onclick="addEventItem()">
        + Create Event
      </button>

    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="right">

    <div class="card">

      <h2>Live Events</h2>

      <div id="events">
        Loading...
      </div>

    </div>

  </div>

</div>

<div id="toast">Saved ✓</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycby3lQ7jcNFMiTq2IPpuSS_RbMnJS2e3xKE5_0X2VDyzElr-nt78N17AVTHIgLbXfjMQSw/exec";

const PASSWORD =
"scout-admin-2026";

/* LOAD EVENTS */

async function loadEvents(){

  const res = await fetch(API);
  const data = await res.json();

  const container =
    document.getElementById("events");

  container.innerHTML = "";

  const rows =
    data.events.slice(1).reverse();

  rows.forEach(e=>{

    container.innerHTML += `
      <div class="event">
        <h3>${e[0]}</h3>
        <p><b>${e[1]}</b></p>
        <p>${e[2]}</p>
      </div>
    `;

  });

}

loadEvents();

/* CREATE EVENT */

async function addEventItem(){

  const title =
    document.getElementById("title").value;

  const date =
    document.getElementById("date").value;

  const description =
    document.getElementById("description").value;

  const res = await fetch(API,{

    method:"POST",

    headers:{
      "Content-Type":"text/plain"
    },

    body:JSON.stringify({

      type:"add",
      password:PASSWORD,

      title,
      date,
      description

    })

  });

  const data = await res.json();

  if(data.success){

    toast("Event Created ✓");

    document.getElementById("title").value="";
    document.getElementById("date").value="";
    document.getElementById("description").value="";

    loadEvents();

  }

}

/* TOAST */

function toast(msg){

  const t =
    document.getElementById("toast");

  t.innerText = msg;
  t.classList.add("show");

  setTimeout(()=>{
    t.classList.remove("show");
  },2000);

}

</script>

</body>
</html>
