<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leader Dashboard</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f3f0ff;
}

header{
  background:#5b2c83;
  color:white;
  padding:20px;
  text-align:center;
}

nav{
  background:#3e1d5c;
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.wrapper{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input,textarea{
  width:100%;
  margin:10px 0;
  padding:10px;
}

button{
  background:#5b2c83;
  color:white;
  border:none;
  padding:10px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
}

.event{
  position:relative;
  padding:15px;
  margin-top:10px;
  background:#faf9ff;
  border-radius:10px;
  border:1px solid #ddd;
}

.delete-btn,.pin-btn{
  position:absolute;
  top:8px;
  width:25px;
  height:25px;
  border:none;
  cursor:pointer;
}

.delete-btn{
  right:8px;
  background:red;
  color:white;
}

.pin-btn{
  right:40px;
  background:orange;
  color:white;
}

</style>
</head>

<body>

<header>
  <h1>Leader Dashboard</h1>
</header>

<nav>
  <a href="cubs-settings.html">Cubs</a>
  <a href="beavers-settings.html">Beavers</a>
  <a href="scouts-settings.html">Scouts</a>
  <a href="https://markmcsweeny95-debug.github.io/7th-worcester-scouts/index.html">Logout</a>
</nav>

<div class="wrapper">

  <div class="card">

    <h2>Create Event</h2>

    <input id="title" placeholder="Title">
    <input id="date" type="date">
    <textarea id="desc" placeholder="Description"></textarea>

    <button onclick="addEvent()">Create</button>

  </div>

  <div class="card">

    <h2>Events</h2>
    <div id="events">Loading...</div>

  </div>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbwpewJd11-3eJcaRd1UYMVux3tE-dHdmjudXMgd89gWJgtDwCzDJX4-f-kuyaJJLi_V/exec";

/* LOAD */
async function loadEvents(){

  console.log("LOADING EVENTS");

  const res = await fetch(API);
  const data = await res.json();

  console.log("DATA:", data);

  const container = document.getElementById("events");
  container.innerHTML = "";

  (data.events || []).forEach(ev => {

    console.log("EVENT:", ev);

    const div = document.createElement("div");
    div.className = "event";

    div.innerHTML = `
      <button class="delete-btn">×</button>
      <button class="pin-btn">${ev.pinned ? "📌" : "📍"}</button>

      <h3>${ev.name}</h3>
      <p>${ev.date}</p>
      <p>${ev.description}</p>
      <small>${ev.id}</small>
    `;

    div.querySelector(".delete-btn").onclick = async () => {
      console.log("DELETE CLICK", ev.id);
      await fetch(API,{
        method:"POST",
        headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({type:"deleteEvent", id:ev.id})
      });
      loadEvents();
    };

    div.querySelector(".pin-btn").onclick = async () => {
      console.log("PIN CLICK", ev.id);
      await fetch(API,{
        method:"POST",
        headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({type:"pinEvent", id:ev.id})
      });
      loadEvents();
    };

    container.appendChild(div);
  });
}

/* ADD */
async function addEvent(){

  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({
      type:"addEvent",
      name:document.getElementById("title").value,
      date:document.getElementById("date").value,
      description:document.getElementById("desc").value
    })
  });

  loadEvents();
}

loadEvents();

</script>

</body>
</html>
