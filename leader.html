<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leader Dashboard | 7th Worcester Scouts</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f0ff;
  color:#222;
}

/* HEADER */
header{
  background:linear-gradient(135deg,#5b2c83,#7b3fb3);
  color:white;
  padding:40px 20px;
  text-align:center;
}

header h1{ margin:0; }

/* NAV */
nav{
  background:#3e1d5c;
  padding:12px;
  text-align:center;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 14px;
  font-weight:bold;
}

/* SETTINGS BAR */
.settings-bar{
  display:flex;
  justify-content:center;
  gap:15px;
  padding:15px;
  background:#eee;
}

.settings-btn{
  background:white;
  border:2px solid #5b2c83;
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  text-decoration:none;
  color:#5b2c83;
}

.settings-btn:hover{
  background:#5b2c83;
  color:white;
}

/* LAYOUT */
.wrapper{
  display:flex;
  gap:20px;
  max-width:1200px;
  margin:auto;
  padding:30px;
}

.left{ flex:2; }
.right{ flex:1; position:sticky; top:20px; height:fit-content; }

/* CARD */
.card{
  background:white;
  border-radius:16px;
  padding:22px;
  margin-bottom:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

h2{
  color:#5b2c83;
  margin-top:0;
}

/* INPUTS */
input,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

textarea{ min-height:90px; }

/* BUTTON */
button{
  background:#5b2c83;
  color:white;
  border:none;
  padding:12px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#4a2268;
}

/* EVENT BOX */
.event{
  border:1px solid #eee;
  border-radius:12px;
  padding:14px;
  margin-top:10px;
  background:#faf9ff;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  background:#5b2c83;
  color:white;
  padding:12px 20px;
  border-radius:12px;
  opacity:0;
  transition:0.3s;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(-6px);
}

.small{
  font-size:0.85rem;
  opacity:0.7;
}

</style>
</head>

<body>

<header>
  <h1>Leader Dashboard</h1>
  <p>7th Worcester Scouts Admin Panel</p>
</header>

<!-- SETTINGS -->
<div class="settings-bar">

  <a class="settings-btn" href="cubs-settings.html">🏆 Cubs Settings</a>
  <a class="settings-btn" href="beavers-settings.html">🐻 Beavers Settings</a>
  <a class="settings-btn" href="scouts-settings.html">⚜️ Scouts Settings</a>

</div>

<nav>
  <a href="../index.html">Home Site</a>
  <a href="../events/index.html">Events</a>
</nav>

<div class="wrapper">

  <!-- LEFT -->
  <div class="left">

    <div class="card">

      <h2>Create Event</h2>

      <input id="title" placeholder="Event title">
      <input id="date" type="date">
      <textarea id="description" placeholder="Description"></textarea>

      <button onclick="addEvent()">+ Create Event</button>

      <p class="small">Events are stored in Google Sheets and auto-sorted.</p>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="card">
      <h2>Live Events</h2>
      <div id="events">Loading...</div>
    </div>

  </div>

</div>

<div id="toast" class="toast">Saved ✓</div>

<script>

/* ✅ NEW WORKING API */
const API =
"https://script.google.com/macros/s/AKfycbwpewJd11-3eJcaRd1UYMVux3tE-dHdmjudXMgd89gWJgtDwCzDJX4-f-kuyaJJLi_V/exec";

/* LOAD EVENTS */
async function loadEvents(){

  const res = await fetch(API);
  const data = await res.json();

  console.log("GET DATA:", data);

  const container = document.getElementById("events");
  container.innerHTML = "";

  const events = data.events || [];

  if(events.length === 0){
    container.innerHTML = "No events yet";
    return;
  }

  events.forEach(ev => {
    container.innerHTML += `
      <div class="event">
        <h3>${ev.name}</h3>
        <p><b>${ev.date}</b></p>
        <p>${ev.description}</p>
      </div>
    `;
  });

}

/* ADD EVENT */
async function addEvent(){

  const title = document.getElementById("title").value;
  const date = document.getElementById("date").value;
  const description = document.getElementById("description").value;

  if(!title || !date){
    toast("Missing title or date");
    return;
  }

  const payload = {
    type: "addEvent",
    name: title,
    date: date,
    description: description
  };

  console.log("SENDING:", payload);

  const res = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  console.log("POST RESPONSE:", data);

  if(data.success){
    toast("Event Created ✓");
    document.getElementById("title").value = "";
    document.getElementById("date").value = "";
    document.getElementById("description").value = "";
    loadEvents();
  } else {
    toast("Failed to create event");
  }
}

/* TOAST */
function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");

  setTimeout(() => {
    t.classList.remove("show");
  }, 2000);
}

loadEvents();

</script>

</body>
</html>
