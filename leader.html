<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leader Dashboard</title>

<style>

body{
  font-family:Arial,sans-serif;
  margin:0;
  background:#faf9ff;
}

header{
  background:#5b2c83;
  color:white;
  padding:60px 20px;
  text-align:center;
}

nav{
  background:#4a2268;
  padding:14px;
  text-align:center;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 14px;
  font-weight:bold;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

.card{
  background:white;
  padding:28px;
  border-radius:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  margin-bottom:25px;
}

input,textarea{
  width:100%;
  padding:14px;
  margin-top:10px;
  margin-bottom:20px;
  border-radius:12px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  background:#5b2c83;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

.event{
  background:#faf9ff;
  border:2px solid #eee;
  padding:22px;
  border-radius:16px;
  margin-top:18px;
}

#toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#5b2c83;
  color:white;
  padding:14px 22px;
  border-radius:12px;
  opacity:0;
  transition:0.3s;
  pointer-events:none;
}

#toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(-10px);
}

</style>
</head>

<body>

<header>
  <h1>Leader Dashboard</h1>
</header>

<nav>
  <a href="/7th-worcester-scouts/index.html">Home Site</a>
  <a href="/7th-worcester-scouts/events/index.html">Events</a>
</nav>

<div class="container">

  <!-- CREATE EVENT -->
  <div class="card">

    <h2>Create Event</h2>

    <input id="title" placeholder="Event title">
    <input id="date" placeholder="10th July 2026">
    <textarea id="description" placeholder="Description"></textarea>

    <button onclick="addEventItem()">
      Create Event →
    </button>

  </div>

  <!-- EVENTS -->
  <div class="card">

    <h2>Events</h2>

    <div id="events">Loading...</div>

  </div>

</div>

<div id="toast">Saved ✓</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycby3lQ7jcNFMiTq2IPpuSS_RbMnJS2e3xKE5_0X2VDyzElr-nt78N17AVTHIgLbXfjMQSw/exec";

const PASSWORD =
"scout-admin-2026";

/* LOAD EVENTS */

async function loadEvents(){

  const res =
    await fetch(API);

  const data =
    await res.json();

  const rows =
    data.events.slice(1).reverse();

  const container =
    document.getElementById("events");

  container.innerHTML = "";

  rows.forEach(e=>{

    container.innerHTML += `

      <div class="event">

        <h3>${e[0]}</h3>
        <p><b>${e[1]}</b></p>
        <p>${e[2]}</p>

      </div>

    `;

  });

}

loadEvents();

/* FIXED FUNCTION NAME */

async function addEventItem(){

  const title =
    document.getElementById("title").value;

  const date =
    document.getElementById("date").value;

  const description =
    document.getElementById("description").value;

  const res = await fetch(API,{

    method:"POST",

    headers:{
      "Content-Type":"text/plain"
    },

    body:JSON.stringify({

      type:"add",

      password:PASSWORD,

      title,
      date,
      description

    })

  });

  const data =
    await res.json();

  if(data.success){

    toast("Event Created ✓");

    document.getElementById("title").value="";
    document.getElementById("date").value="";
    document.getElementById("description").value="";

    loadEvents();

  }

}

/* TOAST */

function toast(msg){

  const t =
    document.getElementById("toast");

  t.innerText = msg;

  t.classList.add("show");

  setTimeout(()=>{

    t.classList.remove("show");

  },2000);

}

</script>

</body>
</html>
