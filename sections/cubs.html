<!-- GOOGLE SHEETS LIVE DATA -->
<script>

async function loadCubs() {

  try {
    const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQrFILlB4hbC-71RRxDWJ9B8fzsZOk-ctYnPiNnNoDO3Sw9ZBqWvoIj1D_2hxlMy_3qF7y7QPopAiV_/gviz/tq?tqx=out:json");

    const text = await res.text();

    // Google wraps JSON weirdly → clean it
    const json = JSON.parse(text.substring(47).slice(0, -2));

    const rows = json.table.rows;

    let eagles = 0;
    let falcons = 0;

    rows.forEach(r => {

      const pack = r.c[0]?.v;
      const points = r.c[1]?.v;

      if (pack === "Eagles") eagles = points;
      if (pack === "Falcons") falcons = points;

    });

    document.getElementById("eaglesPoints").innerText = eagles;
    document.getElementById("falconsPoints").innerText = falcons;

    // bars (max 150 scale so it doesn't break layout)
    document.getElementById("eaglesBar").style.width = Math.min((eagles / 150) * 100, 100) + "%";
    document.getElementById("falconsBar").style.width = Math.min((falcons / 150) * 100, 100) + "%";

  } catch (err) {
    console.error("Failed to load Cubs data", err);
  }
}

loadCubs();

</script>
