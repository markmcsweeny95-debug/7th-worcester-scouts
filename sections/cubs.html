<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cubs | 7th Worcester Scouts</title>

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #faf9ff;
  color: #222;
}

/* HEADER */
header {
  background: #2e7d32;
  color: white;
  padding: 80px 20px;
  text-align: center;
}

/* NAV (UNIVERSAL) */
nav {
  background: #3e1d5c;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  padding: 12px;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  padding: 8px 12px;
  border-radius: 8px;
}

nav a:hover {
  background: rgba(255,255,255,0.12);
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
}

/* CARD */
.card {
  background: white;
  padding: 30px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  margin-bottom: 25px;
}

/* HEADINGS */
h2 {
  color: #2e7d32;
}

/* PROGRESS BAR */
.bar {
  height: 24px;
  border-radius: 999px;
  background: #e0e0e0;
  overflow: hidden;
  margin-top: 8px;
  margin-bottom: 15px;
}

.fill {
  height: 100%;
  border-radius: 999px;
  background: #2e7d32;
  width: 0%;
  transition: width 0.5s ease;
}

/* BUTTON */
.button {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 22px;
  background: #5b2c83;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  font-weight: bold;
}

/* FOOTER */
footer {
  background: #2e7d32;
  color: white;
  text-align: center;
  padding: 24px;
  margin-top: 40px;
}

</style>
</head>

<body>

<header>
  <h1>Cubs</h1>
  <p>7th Worcester Scout Group</p>
</header>

<!-- UNIVERSAL NAVBAR -->
<nav>
  <a href="../index.html">Home</a>
  <a href="../events/index.html">Events</a>
  <a href="../sections/index.html">Sections</a>
  <a href="../discounts/index.html">Discounts</a>
  <a href="../joining.html">Join</a>
  <a href="../contact/index.html">Contact</a>
  <a href="../admin.html">Leader Login</a>
</nav>

<div class="container">

  <div class="card">

    <h2>Meeting Times</h2>

    <p>
      Monday Evenings<br>
      6:30 PM – 8:00 PM
    </p>

    <a class="button" href="../joining.html">
      Find Out How To Join →
    </a>

  </div>

  <div class="card">

    <h2>Live Cub Pack Points</h2>

    <p>
      <b>Eagles</b> — <span id="eaglesPoints">Loading...</span> points
    </p>

    <div class="bar">
      <div id="eaglesBar" class="fill"></div>
    </div>

    <p>
      <b>Falcons</b> — <span id="falconsPoints">Loading...</span> points
    </p>

    <div class="bar">
      <div id="falconsBar" class="fill"></div>
    </div>

  </div>

</div>

<footer>
  © 2026 7th Worcester Scout Group
</footer>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycby3lQ7jcNFMiTq2IPpuSS_RbMnJS2e3xKE5_0X2VDyzElr-nt78N17AVTHIgLbXfjMQSw/exec";

async function loadCubs(){

  try {

    const res = await fetch(API_URL);
    const data = await res.json();

    const cubs = data.cubs;

    let eagles = 0;
    let falcons = 0;

    cubs.forEach(row => {

      if(row[0] === "Eagles") eagles = row[1];
      if(row[0] === "Falcons") falcons = row[1];

    });

    document.getElementById("eaglesPoints").innerText = eagles;
    document.getElementById("falconsPoints").innerText = falcons;

    document.getElementById("eaglesBar").style.width =
      Math.min((eagles / 150) * 100, 100) + "%";

    document.getElementById("falconsBar").style.width =
      Math.min((falcons / 150) * 100, 100) + "%";

  } catch(err){
    console.error(err);
  }
}

loadCubs();

</script>

</body>
</html>
