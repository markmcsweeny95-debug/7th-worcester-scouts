<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cubs | 7th Worcester Scouts</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #faf9ff;
      color: #222;
    }

    header {
      background: #2e7d32;
      color: white;
      padding: 70px 20px;
      text-align: center;
    }

    nav {
      background: #1b5e20;
      padding: 14px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 14px;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      margin-bottom: 25px;
    }

    h2 {
      color: #2e7d32;
      margin-top: 0;
    }

    .pack {
      margin-bottom: 28px;
    }

    .pack-name {
      margin-bottom: 10px;
      font-weight: bold;
      font-size: 1.05rem;
    }

    .bar-background {
      width: 100%;
      height: 30px;
      background: #e0e0e0;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      border-radius: 999px;
    }

    .eagles-bar {
      width: 80%;
      background: #2e7d32;
    }

    .falcons-bar {
      width: 70%;
      background: #66bb6a;
    }

    footer {
      background: #2e7d32;

<nav>

  <a href="index.html">Sections</a>
  <a href="../contact/index.html">Contact</a>
</nav>

<div class="container">

  <div class="card">

    <h2>Meeting Times</h2>

    <p>
      Monday Evenings<br>
      6:30 PM – 8:00 PM
    </p>

  </div>

  <div class="card">

    <h2>Cub Pack Points</h2>

    <div class="pack">

      <div class="pack-name">
        Eagles — 120 Points
      </div>

      <div class="bar-background">
        <div class="bar eagles-bar"></div>

    </div>

    <div class="pack">

      <div class="pack-name">

      </div>
