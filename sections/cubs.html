<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cubs | 7th Worcester Scouts</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #faf9ff;
  color: #222;
}

/* HEADER (CUBS GREEN - MATCH ADMIN STYLE) */
header {
  background: #2e7d32;
  color: white;
  padding: 35px 20px;
  text-align: center;
}

/* NAV (ADMIN STYLE GREEN BAR) */
nav {
  background: #1b5e20;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  padding: 12px;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  padding: 8px 12px;
  border-radius: 8px;
}

nav a:hover {
  background: rgba(255,255,255,0.12);
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
}

/* CARD */
.card {
  background: white;
  padding: 30px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  margin-bottom: 25px;
}

/* HEADINGS */
h2 {
  color: #2e7d32;
}

/* BAR */
.bar {
  height: 24px;
  border-radius: 999px;
  background: #e0e0e0;
  overflow: hidden;
  margin-top: 8px;
  margin-bottom: 15px;
}

.fill {
  height: 100%;
  border-radius: 999px;
  background: #2e7d32;
  width: 0%;
  transition: width 0.5s ease;
}

/* BUTTON */
.button {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 22px;
  background: #2e7d32;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  font-weight: bold;
}

/* FOOTER */
footer {
  background: #1b5e20;
  color: white;
  text-align: center;
  padding: 24px;
  margin-top: 40px;
}

#error {
  color: red;
  font-weight: bold;
  margin-top: 10px;
}

</style>
</head>

<body>

<header>
  <h1>Cubs</h1>
  <p>7th Worcester Scout Group</p>
</header>

<nav>
  <a href="../index.html">Home</a>
  <a href="../events/index.html">Events</a>
  <a href="../sections/index.html">Sections</a>
  <a href="../discounts/index.html">Discounts</a>
  <a href="../joining.html">Join</a>
  <a href="../contact/index.html">Contact</a>
  <a href="../leader.html">Leader Login</a>
</nav>

<div class="container">

  <div class="card">

    <h2>Meeting Times</h2>

    <p>
      Monday Evenings<br>
      6:30 PM – 8:00 PM
    </p>

    <a class="button" href="../joining.html">
      Find Out How To Join →
    </a>

  </div>

  <div class="card">

    <h2>Live Cub Pack Points</h2>

    <p>
      <b>Eagles</b> —
      <span id="eaglesPoints">Loading...</span> points
    </p>

    <div class="bar">
      <div id="eaglesBar" class="fill"></div>
    </div>

    <p>
      <b>Falcons</b> —
      <span id="falconsPoints">Loading...</span> points
    </p>

    <div class="bar">
      <div id="falconsBar" class="fill"></div>
    </div>

    <p id="error"></p>

  </div>

</div>

<footer>
  © 2026 7th Worcester Scout Group
</footer>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwpewJd11-3eJcaRd1UYMVux3tE-dHdmjudXMgd89gWJgtDwCzDJX4-f-kuyaJJLi_V/exec";

async function loadCubs() {

  try {

    const res = await fetch(API_URL);
    const data = await res.json();

    let eagles = 0;
    let falcons = 0;

    if (data.cubs && Array.isArray(data.cubs)) {

      data.cubs.forEach(row => {

        if (row[0] === "Eagles") {
          eagles = Number(row[1]) || 0;
        }

        if (row[0] === "Falcons") {
          falcons = Number(row[1]) || 0;
        }

      });

    }

    document.getElementById("eaglesPoints").textContent = eagles;
    document.getElementById("falconsPoints").textContent = falcons;

    const max = Math.max(eagles, falcons, 1);

    document.getElementById("eaglesBar").style.width =
      (eagles / max) * 100 + "%";

    document.getElementById("falconsBar").style.width =
      (falcons / max) * 100 + "%";

  } catch (err) {

    document.getElementById("error").textContent =
      "Failed to load cub points (API/CORS issue)";

    console.error(err);
  }

}

loadCubs();

</script>

</body>
</html>
