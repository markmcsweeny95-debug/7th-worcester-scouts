<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Events | 7th Worcester Scouts</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#faf9ff;
}

header{
  background:#5b2c83;
  color:white;
  padding:70px 20px;
  text-align:center;
}

nav{
  background:#4a2268;
  padding:14px;
  text-align:center;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 14px;
  font-weight:bold;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

.event{
  background:white;
  padding:28px;
  border-radius:18px;
  margin-bottom:22px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.pinned{
  border:3px solid gold;
}

</style>
</head>

<body>

<header>
  <h1>Upcoming Events</h1>
</header>

<nav>
  <a href="/7th-worcester-scouts/index.html">Home</a>
</nav>

<div class="container" id="events">

  Loading events...

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycby3lQ7jcNFMiTq2IPpuSS_RbMnJS2e3xKE5_0X2VDyzElr-nt78N17AVTHIgLbXfjMQSw/exec";

async function loadEvents(){

  const res =
    await fetch(API);

  const data =
    await res.json();

  const rows =
    data.events.slice(1).reverse();

  const container =
    document.getElementById("events");

  container.innerHTML = "";

  rows.forEach(event=>{

    container.innerHTML += `

      <div class="event ${event[4]==="YES"?"pinned":""}">

        <h2>
          ${event[1]}
        </h2>

        <h3>
          ${event[2]}
        </h3>

        <p>
          ${event[3]}
        </p>

        ${
          event[4]==="YES"
          ? "<p><b>📌 Featured Event</b></p>"
          : ""
        }

      </div>

    `;

  });

}

loadEvents();

</script>

</body>
</html>
